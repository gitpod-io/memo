tasks:
  installDeps:
    name: Install dependencies
    description: Install npm packages and Playwright browsers.
    command: |
      pnpm install && pnpm exec playwright install --with-deps chromium
    triggeredBy:
      - postDevcontainerStart

services:
  dev-server:
    name: Dev Server
    description: Next.js development server on port 3000.
    commands:
      start: pnpm dev
      ready: curl -sf http://localhost:3000
  storybook:
    name: Storybook
    description: Storybook component browser on port 6006.
    commands:
      start: pnpm storybook -p 6006 -h 0.0.0.0 --no-open
      ready: curl -sf http://localhost:6006
