name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        The Feature Planner will triage this issue and add appropriate labels.
        If more detail is needed, it will add `needs-human` and ask questions.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken?
      placeholder: Describe what's happening and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What should happen vs what actually happens?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this?
      options:
        - "1 — Critical (app broken, data loss)"
        - "2 — Major (feature broken, workaround exists)"
        - "3 — Minor (cosmetic, edge case)"
    validations:
      required: true
